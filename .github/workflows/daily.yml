name: Daily Puzzle Fetch & Benchmark

on:
  schedule:
    # Run at 08:00 UTC daily – gives time for the puzzle + stats to be populated
    - cron: 0 8 * * *
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write
  issues: write

jobs:
  fetch-and-benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - run: npm ci

      - name: Fetch latest puzzles & stats
        run: npm run fetch

      - name: Run benchmark & update README
        run: npm run benchmark

      - name: Write daily run summary
        run: npm run daily-summary

      - name: Check for benchmark regressions
        id: regression
        run: npm run regression-check

      - name: Open issue for non-close regression
        if: steps.regression.outputs.has_regression == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_TITLE: ${{ steps.regression.outputs.issue_title }}
          ISSUE_BODY_PATH: ${{ steps.regression.outputs.issue_body_path }}
        run: |
          gh issue create \
            --title "$ISSUE_TITLE" \
            --body-file "$ISSUE_BODY_PATH" \
            --label "benchmark-regression"

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ README.md
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "chore: daily puzzle fetch & benchmark update"
          git push
